name: Release

on:
  workflow_dispatch: {}
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            args: ''
          - os: ubuntu-22.04
            args: ''
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.92.0"
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri -> target

      - name: Setup MSVC environment (Windows, for vendored OpenSSL build)
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install NASM (Windows, for vendored OpenSSL / SQLCipher)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          choco install nasm -y
          echo "C:\\Program Files\\NASM" >> "$GITHUB_PATH"

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            build-essential \
            file \
            perl

      - name: Import Apple certificate
        if: matrix.os == 'macos-latest' && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_SIGNING_IDENTITY_SECRET: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import cert.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm cert.p12

          if [ -n "$APPLE_SIGNING_IDENTITY_SECRET" ]; then
            SIGNING_IDENTITY="$APPLE_SIGNING_IDENTITY_SECRET"
          else
            SIGNING_IDENTITY=$(security find-identity -v -p codesigning build.keychain | grep '"' | head -1 | sed 's/.*"\(.*\)"/\1/')
          fi
          echo "APPLE_SIGNING_IDENTITY=$SIGNING_IDENTITY" >> $GITHUB_ENV

      - name: Write Apple API key
        if: matrix.os == 'macos-latest' && env.APPLE_API_KEY_CONTENT != ''
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          mkdir -p ~/private_keys
          echo "$APPLE_API_KEY_CONTENT" | base64 --decode > ~/private_keys/AuthKey_${APPLE_API_KEY}.p8

      - name: Build @aster/ui
        run: |
          git clone --depth=1 https://github.com/Aster-Privacy/aster-ui.git ../aster-ui
          cd ../aster-ui
          npm install --no-audit --no-fund
          npm run build

      - name: Fetch aster-crypto source (Aster-Mail)
        run: git clone --depth=1 https://github.com/Aster-Privacy/Aster-Mail.git ../Aster-Mail

      - name: Install frontend dependencies
        run: npm install --no-audit --no-fund --force

      - name: Build and publish release
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ${{ secrets.APPLE_API_KEY != '' && format('~/private_keys/AuthKey_{0}.p8', secrets.APPLE_API_KEY) || '' }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: v__VERSION__
          releaseName: Aster Bridge __VERSION__
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}
          tauriScript: npm run tauri

      - name: Rename assets to canonical names
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          V=$(node -p "require('./package.json').version")
          TAG="v${V}"
          TMP=$(mktemp -d)

          rename_asset() {
            local src="$1" dst="$2"
            if gh release download "$TAG" --pattern "$src" --dir "$TMP" --clobber 2>/dev/null; then
              mv "$TMP/$src" "$TMP/$dst"
              gh release upload "$TAG" "$TMP/$dst" --clobber
            fi
          }

          if [[ "${{ matrix.os }}" == "ubuntu-22.04" ]]; then
            rename_asset "Aster.Bridge_${V}_amd64.AppImage"     "Aster-Bridge-x86_64.AppImage"
            rename_asset "Aster.Bridge_${V}_amd64.AppImage.sig" "Aster-Bridge-x86_64.AppImage.sig"
            rename_asset "Aster.Bridge_${V}_amd64.deb"          "Aster-Bridge-amd64.deb"
            rename_asset "Aster.Bridge_${V}_amd64.deb.sig"      "Aster-Bridge-amd64.deb.sig"
            rename_asset "Aster.Bridge-${V}-1.x86_64.rpm"       "Aster-Bridge-x86_64.rpm"
            rename_asset "Aster.Bridge-${V}-1.x86_64.rpm.sig"   "Aster-Bridge-x86_64.rpm.sig"
          elif [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            rename_asset "Aster.Bridge_${V}_x64-setup.exe"     "Aster-Bridge-x64-setup.exe"
            rename_asset "Aster.Bridge_${V}_x64-setup.exe.sig" "Aster-Bridge-x64-setup.exe.sig"
            rename_asset "Aster.Bridge_${V}_x64_en-US.msi"     "Aster-Bridge-x64.msi"
            rename_asset "Aster.Bridge_${V}_x64_en-US.msi.sig" "Aster-Bridge-x64.msi.sig"
          elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            rename_asset "Aster.Bridge_${V}_universal.dmg"            "Aster-Bridge-universal.dmg"
            rename_asset "Aster.Bridge_${V}_universal.dmg.sig"        "Aster-Bridge-universal.dmg.sig"
            rename_asset "Aster.Bridge_${V}_universal.app.tar.gz"     "Aster-Bridge-universal.app.tar.gz"
            rename_asset "Aster.Bridge_${V}_universal.app.tar.gz.sig" "Aster-Bridge-universal.app.tar.gz.sig"
          fi

  update_latest_json:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Rewrite latest.json with canonical asset URLs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          V=$(node -p "require('./package.json').version")
          TAG="v${V}"
          TMP=$(mktemp -d)
          gh release download "$TAG" --pattern latest.json --dir "$TMP" --clobber
          sed -i \
            -e "s|Aster\.Bridge_${V}_amd64\.AppImage|Aster-Bridge-x86_64.AppImage|g" \
            -e "s|Aster\.Bridge_${V}_x64-setup\.exe|Aster-Bridge-x64-setup.exe|g" \
            -e "s|Aster\.Bridge_${V}_universal\.app\.tar\.gz|Aster-Bridge-universal.app.tar.gz|g" \
            "$TMP/latest.json"
          gh release upload "$TAG" "$TMP/latest.json" --clobber
